name: Release

# タグ push (例: v0.2.0) でのみ GitHub Release を作成する。
# workflow_dispatch は「ビルドが通るか」を確認するためだけの手動実行で、
# Release は作らずビルド成果物を Actions のアーティファクトとして残す。
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::タグ v$tag_version と package.json の version ($pkg_version) が一致しません。両方を合わせてから再度タグを push してください。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # タグ push: ビルド + Draft Release を作成し、msi/exe を添付する
      - name: Build and create draft release
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TimeCanvas ${{ github.ref_name }}"
          releaseBody: |
            TimeCanvas ${{ github.ref_name }}

            インストーラー（.msi / .exe）をダウンロードして実行してください。
            変更点はコミット履歴を参照してください。
          releaseDraft: true
          prerelease: false

      # 手動実行: リリースは作らず、ビルドできるかだけを確認してアーティファクトに残す
      - name: Build only (manual verification run)
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri build

      - name: Upload build artifacts (manual run only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: timecanvas-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
